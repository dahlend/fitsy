name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust:
    name: Rust ${{ matrix.toolchain }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, "1.88"]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: cargo test
        run: cargo test --all-targets
      - name: cargo doc
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: -D warnings

  lint-python:
    name: Python lint (ruff + black)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install linters
        run: pip install ruff black
      - name: ruff check
        run: ruff check .
      - name: black --check
        run: black --check .

  # Build a single Linux wheel, run Python tests, upload as artifact for docs.
  python:
    name: Python wheel + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: Swatinem/rust-cache@v2
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --features python --out target/wheels
          manylinux: auto
      - name: Install wheel + run tests
        run: |
          pip install pytest numpy
          pip install --no-index --find-links target/wheels fitsy
          pytest tests/python -v
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-manylinux_x86_64
          path: target/wheels/*.whl
          retention-days: 1

  docs:
    name: Sphinx docs
    runs-on: ubuntu-latest
    needs: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Download wheel
        uses: actions/download-artifact@v4
        with:
          name: wheel-manylinux_x86_64
          path: dist/
      - name: Install wheel + doc dependencies
        run: pip install --find-links dist fitsy ".[docs]"
      - name: Build Sphinx docs
        run: sphinx-build -b html -W --keep-going docs docs/_build/html
      - name: Fix permissions
        run: |
          chmod -c -R +rX "docs/_build/html/" | while read line; do
            echo "::warning title=Invalid file permissions automatically fixed::$line"
          done
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html/

  deploy-docs:
    name: Deploy docs to GitHub Pages
    runs-on: ubuntu-latest
    needs: docs
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
