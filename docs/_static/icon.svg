<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">

  <!-- Background -->
  <rect width="100" height="100" rx="18" fill="#0d1b40"/>

  <!-- HDU stack, back to front -->
  <rect x="15" y="70" width="70" height="18" rx="3" fill="#162d6b"/>
  <rect x="15" y="59" width="70" height="18" rx="3" fill="#1d3f99"/>
  <rect x="15" y="48" width="70" height="18" rx="3" fill="#2558d9"/>

  <!-- Galaxy, centered in space above blocks (50, 26) -->
  <g transform="rotate(30 50 26)">
    <!-- Outer haze -->
    <ellipse cx="50" cy="26" rx="14" ry="5.5" fill="#2040a0" opacity="0.25"/>
    <!-- Disc -->
    <ellipse cx="50" cy="26" rx="10" ry="4"   fill="#2a50c8" opacity="0.45"/>
    <!-- Bulge -->
    <ellipse cx="50" cy="26" rx="5"  ry="3"   fill="#4070e0" opacity="0.6"/>
    <!-- Spiral arm 1: left sweeping up -->
    <path d="M 47,26 C 39,23 40,16 50,13"
          fill="none" stroke="#90b8ff" stroke-width="3"
          stroke-linecap="round" opacity="0.75"/>
    <!-- Spiral arm 2: right sweeping down -->
    <path d="M 53,26 C 61,29 60,36 50,39"
          fill="none" stroke="#90b8ff" stroke-width="3"
          stroke-linecap="round" opacity="0.75"/>
    <!-- Core glow -->
    <circle cx="50" cy="26" r="3.5" fill="#f0a020" opacity="0.65"/>
    <!-- Core -->
    <circle cx="50" cy="26" r="1.8" fill="#fff9e0" opacity="0.95"/>
  </g>

</svg>
